services:
  - type: web
    name: skcsai
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build:supabase
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ENABLE_SPORTSAPI_PRO_FOOTBALL
        value: "true"
      - key: DISABLE_SPORTSAPI_PRO_FOOTBALL
        value: "false"
      - key: SPORTSAPI_PRO_FOOTBALL_RAPIDAPI_HOST
        value: sportsapi-pro-football-data.p.rapidapi.com
      - key: SPORTSAPI_PRO_FOOTBALL_RAPIDAPI_KEY
        sync: false
      - key: SPORTSAPI_PRO_FOOTBALL_MIN_INTERVAL_MS
        value: 6500
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: X_APISPORTS_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: X_RAPIDAPI_KEY
        sync: false
      - key: CRICKETDATA_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: USER_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: HUGGINGFACE_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: LONG_CAT_KEY
        sync: false
      - key: CONSOLEAPI_KEY
        sync: false
      - key: DATA_MODE
        value: live
  - type: cron
    name: skcs-weekly-global-scrape
    env: node
    region: frankfurt
    plan: free
    schedule: "0 2 * * 1"
    buildCommand: npm install
    startCommand: node backend/deploy-trigger.js
    envVars:
      - key: SKCS_TRIGGER_HOST
        sync: false
      - key: ADMIN_API_KEY
        sync: false
  - type: cron
    name: skcs-cricket-daily-fixtures
    env: node
    region: frankfurt
    plan: free
    schedule: "1 22 * * *"
    buildCommand: npm install
    startCommand: node backend/deploy-trigger-cricket.js
    envVars:
      - key: SKCS_TRIGGER_HOST
        sync: false
      - key: CRON_SECRET
        sync: false
