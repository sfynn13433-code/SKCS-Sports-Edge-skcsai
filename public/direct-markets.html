<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to SportAnalytics Pro...</title>
    <meta http-equiv="refresh" content="0; url=/#global-majors">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .redirect-container {
            padding: 2rem;
        }
        .redirect-container h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text);
        }
        .redirect-container p {
            color: var(--muted);
            margin-bottom: 1.5rem;
        }
        .redirect-container a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .redirect-container a:hover {
            text-decoration: underline;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h1>SportAnalytics Pro</h1>
        <p>Redirecting to the new portal...</p>
        <p>If not redirected automatically, <a href="/#global-majors">click here</a>.</p>
    </div>
    <script>
        window.location.replace('/#global-majors');
    </script>
</body>
</html>
