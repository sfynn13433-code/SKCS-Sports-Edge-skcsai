<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Language – SKCS AI</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --dark: #0f172a;
            --dark-card: rgba(30, 41, 59, 0.85);
            --gray: #94a3b8;
            --light: #f8fafc;
            --white: #ffffff;
            --overlay: rgba(15, 23, 42, 0.72);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--white);
            min-height: 100vh;
            background: var(--dark) url('language.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        body::before {
            content: ''; position: absolute; inset: 0; background: var(--overlay); z-index: 1;
        }
        .container {
            width: 100%; max-width: 620px; background: var(--dark-card);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.07);
            padding: 52px 40px; box-shadow: 0 25px 70px rgba(0,0,0,0.55);
            text-align: center; position: relative; z-index: 2;
        }
        .logo-area { margin-bottom: 36px; }
        .logo-area img { max-width: 260px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 10px 30px rgba(13,110,253,0.35)); }
        h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 16px; color: var(--primary); }
        .subtitle { font-size: 1.22rem; color: #cbd5e1; margin-bottom: 44px; line-height: 1.6; }
        .select-wrapper { position: relative; margin-bottom: 44px; }
        select {
            width: 100%; padding: 20px 28px 20px 24px; font-size: 1.32rem; font-weight: 500;
            background: #1e293b; border: 2px solid rgba(13,110,253,0.4); border-radius: 14px;
            color: #f1f5f9; appearance: None; cursor: pointer; transition: all 0.3s ease;
        }
        select:hover { border-color: var(--primary); background: #253549; }
        select:focus { border-color: var(--primary); box-shadow: 0 0 0 5px rgba(13,110,253,0.22); outline: None; }
        .select-wrapper::after {
            content: '▼'; position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
            pointer-events: None; color: #93c5fd; font-size: 1rem; font-weight: bold;
        }
        .back-home { font-size: 1.18rem; margin-top: 24px; }
        .back-home a { color: #93c5fd; text-decoration: None; font-weight: 500; transition: color 0.2s; }
        .back-home a:hover { color: #60a5fa; text-decoration: underline; }
        @media (max-width: 480px) {
            .container { padding: 40px 28px; }
            h1 { font-size: 2.3rem; }
            select { font-size: 1.2rem; padding: 18px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area"></div>
        <h1>Choose Your Language</h1>
        <p class="subtitle">Select your preferred language to continue.<br>The website will load in the selected language.</p>
        <div class="select-wrapper">
            <select id="lang" onchange="go()">
                <option value="" disabled selected>Select language...</option>
                <option value="af">Afrikaans</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="pt">Portuguese</option>
                <option value="es">Spanish</option>
                <option value="sw">Swahili</option>
                <option value="xh">isiXhosa</option>
                <option value="zu">isiZulu</option>
            </select>
        </div>
        <p class="back-home"><a href="index.html">← Back to Home</a></p>
    </div>
    <script>
        function go() {
            const lang = document.getElementById('lang').value;
            if (lang) { window.location.href = 'index.html?lang=' + lang; }
        }
    </script>
</body>
</html>
