<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKCS AI Sports Edge - Login / Register</title>
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('login.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
        }
        /* Dark overlay for better contrast */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        h1 {
            text-align: center;
            color: #0d6efd;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #0d6efd;
            color: white;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #0b5ed7;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #0d6efd;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>SKCS AI Sports Edge</h1>
        <p class="subtitle">Sign in to access your insights</p>

        <div class="tab-buttons">
            <button id="loginTab" class="tab-btn active">Login</button>
            <button id="registerTab" class="tab-btn">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form active">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button id="loginBtn" class="submit-btn">Login</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form">
            <div class="form-group">
                <label for="registerFirstName">First Name</label>
                <input type="text" id="registerFirstName" placeholder="First name" autocomplete="given-name" required>
            </div>
            <div class="form-group">
                <label for="registerSurname">Surname</label>
                <input type="text" id="registerSurname" placeholder="Surname" autocomplete="family-name" required>
            </div>
            <div class="form-group">
                <label for="registerEmail">Email Address</label>
                <input type="email" id="registerEmail" placeholder="your@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="registerPhone">Telephone Number</label>
                <input type="tel" id="registerPhone" placeholder="+27..." autocomplete="tel" required>
            </div>
            <div class="form-group">
                <label for="registerStreet">Street Address</label>
                <input type="text" id="registerStreet" placeholder="Street address" autocomplete="address-line1" required>
            </div>
            <div class="form-group">
                <label for="registerTown">Town / City</label>
                <input type="text" id="registerTown" placeholder="Town / City" autocomplete="address-level2" required>
            </div>
            <div class="form-group">
                <label for="registerCountry">Country</label>
                <input type="text" id="registerCountry" placeholder="Country" autocomplete="country-name" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password" required>
            </div>
            <button id="registerBtn" class="submit-btn">Register</button>
            <div id="registerMessage" class="message"></div>
        </div>

        <a href="index.html" class="back-link">← Back to home</a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase-bundle.js"></script>
    <script>
        const API_BASE_URL = window.API_BASE_URL || '';
        
        // SUPABASE CLIENT INITIALIZATION - Robust version handling different bundling patterns
        (function initSupabaseClient() {
            if (window.supabaseClient && window.supabaseClient.auth) {
                console.log("[Supabase] Client already initialized");
                return;
            }
            
            try {
                console.log("[Supabase] Attempting to find createClient...");
                
                if (typeof supabase === 'undefined') {
                    throw new Error("Supabase object is completely missing.");
                }

                // Hunt for the correct createClient method depending on how the bundle wrapped it
                if (typeof supabase.createClient === 'function') {
                    console.log("[Supabase] Found standard supabase.createClient");
                    window.supabaseClient = supabase.createClient(
                        window.SUPABASE_URL || 'https://ghzjntdvaptuxfpvhybb.supabase.co',
                        window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoempudGR2YXB0dXhmcHZoeWJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDAzNzIsImV4cCI6MjA4NzgxNjM3Mn0.nWxOY0lDIDDvexELk9De2aEfPfM5iJjoaW91tbL7YQk',
                        { auth: { persistSession: true, storageKey: 'skcs-auth', storage: window.localStorage } }
                    );
                    
                } else if (supabase.supabase && typeof supabase.supabase.createClient === 'function') {
                    console.log("[Supabase] Found nested supabase.supabase.createClient");
                    window.supabaseClient = supabase.supabase.createClient(
                        window.SUPABASE_URL || 'https://ghzjntdvaptuxfpvhybb.supabase.co',
                        window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoempudGR2YXB0dXhmcHZoeWJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDAzNzIsImV4cCI6MjA4NzgxNjM3Mn0.nWxOY0lDIDDvexELk9De2aEfPfM5iJjoaW91tbL7YQk',
                        { auth: { persistSession: true, storageKey: 'skcs-auth', storage: window.localStorage } }
                    );
                    
                } else if (supabase.default && typeof supabase.default.createClient === 'function') {
                    console.log("[Supabase] Found default supabase.default.createClient");
                    window.supabaseClient = supabase.default.createClient(
                        window.SUPABASE_URL || 'https://ghzjntdvaptuxfpvhybb.supabase.co',
                        window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoempudGR2YXB0dXhmcHZoeWJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDAzNzIsImV4cCI6MjA4NzgxNjM3Mn0.nWxOY0lDIDDvexELk9De2aEfPfM5iJjoaW91tbL7YQk',
                        { auth: { persistSession: true, storageKey: 'skcs-auth', storage: window.localStorage } }
                    );
                    
                } else {
                    console.error("[Supabase] The supabase object exists, but createClient is nowhere to be found. Object structure:", Object.keys(supabase));
                    throw new Error("createClient not found in bundle.");
                }

                console.log("[Supabase] Client successfully initialized!");

            } catch (error) {
                console.error("[Supabase] Initialization failed:", error.message);
            }
        })();
        const supabaseClient = window.supabaseClient || null;

        // Tab switching
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        (function applyQueryParams() {
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.get('register') === '1') {
                    registerTab.click();
                }
                const next = params.get('next');
                if (next) {
                    sessionStorage.setItem('skcs_after_auth', next);
                }
            } catch (e) { /* ignore */ }
        })();

        // Login handler
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill in all fields';
                return;
            }

            try {
                // Use window.supabaseClient directly with proper null check
                const client = window.supabaseClient;
                if (!client || !client.auth) {
                    console.error("[Supabase] Client missing. supabase:", typeof supabase, "createClient:", typeof supabase?.createClient);
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Authentication system is initializing. Please refresh the page.';
                    return;
                }

                const { data, error } = await client.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = error.message || 'Login failed';
                    return;
                }

                if (!data?.session) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'No session returned. Please verify your email and try again.';
                    return;
                }

                const dest = sessionStorage.getItem('skcs_after_auth') || 'index.html';
                sessionStorage.removeItem('skcs_after_auth');
                window.location.href = dest;
            } catch (error) {
                console.error("[Login] Error:", error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection error: ' + (error.message || 'Unknown error');
            }
        });

        // Register handler
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const firstName = document.getElementById('registerFirstName').value.trim();
            const surname = document.getElementById('registerSurname').value.trim();
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value.trim();
            const street = document.getElementById('registerStreet').value.trim();
            const town = document.getElementById('registerTown').value.trim();
            const country = document.getElementById('registerCountry').value.trim();
            const password = document.getElementById('registerPassword').value;
            const messageDiv = document.getElementById('registerMessage');

            if (!firstName || !surname || !email || !phone || !street || !town || !country || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please fill in all fields';
                return;
            }
            if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must be at least 6 characters';
                return;
            }

            try {
                // Use window.supabaseClient directly with proper null check
                const client = window.supabaseClient;
                if (!client || !client.auth) {
                    console.error("[Supabase] Client missing. supabase:", typeof supabase, "createClient:", typeof supabase?.createClient);
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Authentication system is initializing. Please refresh the page.';
                    return;
                }

                const { data, error } = await client.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            first_name: firstName,
                            surname,
                            last_name: surname,
                            phone,
                            street,
                            city: town,
                            town,
                            country
                        }
                    }
                });

                if (error) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = error.message || 'Registration failed';
                    return;
                }

                let session = data?.session || null;
                if (!session) {
                    const signInRes = await client.auth.signInWithPassword({ email, password });
                    if (!signInRes.error && signInRes.data?.session) {
                        session = signInRes.data.session;
                    }
                }

                if (session) {
                    sessionStorage.removeItem('skcs_after_auth');
                    try {
                        localStorage.setItem('skcs_experience_mode', '1');
                        localStorage.setItem('skcs_role', 'trial');
                    } catch (e) { /* ignore */ }
                    // Post-confirmation routing: follow 'next' param or default to payment
                    const urlParams = new URLSearchParams(window.location.search);
                    const next = urlParams.get('next') || 'payment.html';
                    window.location.href = next;
                    return;
                }

                messageDiv.className = 'message success';
                messageDiv.textContent = 'Registration complete. Please log in to continue.';
                loginTab.click();
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection error';
            }
        });

        // Post-confirmation routing: listen for auth state changes (email confirmation)
        if (window.supabaseClient && window.supabaseClient.auth) {
            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session?.user) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const next = urlParams.get('next') || 'payment.html';
                    window.location.href = next;
                }
            });
        }
    </script>
</body>
</html>
