name: Lineups Enrichment

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-lineups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Generate H2H, Injuries (refresh), and Lineups
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          DATE=$(date -u +%F)
          npm run h2h:enrich -- --date=$DATE --out=public/data/h2h-$DATE.json
          npm run injuries:enrich -- --in=public/data/h2h-$DATE.json --out=public/data/injuries-$DATE.json
          npm run lineups:enrich -- --in=public/data/h2h-$DATE.json --out=public/data/lineups-$DATE.json
          node scripts/enrich-travel.js --in=public/data/injuries-$DATE.json --out=public/data/travel-$DATE.json
      - name: Commit and push
        run: |
          DATE=$(date -u +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/h2h-$DATE.json public/data/injuries-$DATE.json public/data/lineups-$DATE.json public/data/travel-$DATE.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: lineups enrichment for $DATE [skip ci]"
            git push
          fi
