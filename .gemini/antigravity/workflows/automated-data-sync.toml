[workflow]
name = "automated-data-sync"
description = "Automated multi-sport data synchronization with intelligent fallback"
version = "1.0"
enabled = true

[workflow.triggers]
schedule = "*/15 * * * *"  # Every 15 minutes
events = ["fixture_update", "odds_change", "injury_report"]

[workflow.steps]
[workflow.steps.data_fetch]
type = "parallel"
description = "Fetch data from multiple sources simultaneously"

[workflow.steps.data_fetch.sources]
rapidapi = { provider = "rapidapi", timeout = 30, retry = 3 }
thesportsdb = { provider = "thesportsdb", timeout = 20, retry = 2 }
espn = { provider = "espn", timeout = 25, retry = 2 }

[workflow.steps.data_validation]
type = "filter"
description = "Validate and clean incoming data"
rules = [
    "remove_duplicates",
    "validate_fixtures",
    "check_data_integrity",
    "normalize_timestamps"
]

[workflow.steps.ai_enrichment]
type = "transform"
description = "AI-powered data enrichment"
model = "gemini-pro"
context_window = 32000
temperature = 0.1

[workflow.steps.ai_enrichment.tasks]
market_analysis = { priority = "high", confidence_threshold = 0.75 }
risk_assessment = { priority = "medium", confidence_threshold = 0.65 }
injury_impact = { priority = "high", confidence_threshold = 0.80 }

[workflow.steps.database_sync]
type = "output"
description = "Sync validated data to database"
batch_size = 100
conflict_resolution = "update_latest"

[workflow.steps.notification]
type = "condition"
description = "Send notifications for critical events"
conditions = [
    "high_risk_matches",
    "major_injuries",
    "odds_anomalies"
]

[workflow.error_handling]
retry_policy = "exponential_backoff"
max_retries = 3
retry_delay = "30s"
dead_letter_queue = true

[workflow.monitoring]
metrics = [
    "data_freshness",
    "processing_latency",
    "error_rate",
    "success_rate"
]
alerts = [
    "data_stale_alert",
    "high_error_rate_alert",
    "processing_bottleneck"
]
