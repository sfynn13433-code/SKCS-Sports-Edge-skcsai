[workflow]
name = "smart-prediction-engine"
description = "AI-powered prediction generation with adaptive learning"
version = "1.0"
enabled = true

[workflow.triggers]
schedule = "*/30 * * * *"  # Every 30 minutes
events = ["new_fixture", "odds_update", "context_change"]
confidence_threshold = 0.70

[workflow.steps]
[workflow.steps.market_scanning]
type = "scan"
description = "Intelligent market opportunity scanning"

[workflow.steps.market_scanning.parameters]
sports = ["football", "basketball", "tennis", "cricket", "baseball"]
leagues = ["premier_league", "nba", "atp", "ipl", "mlb"]
markets = ["1x2", "over_under", "btts", "handicap"]
volatility_threshold = 0.15

[workflow.steps.data_aggregation]
type = "aggregate"
description = "Multi-source data aggregation"

[workflow.steps.data_aggregation.sources]
historical_data = { lookback_days = 30, weight = 0.3 }
real_time_odds = { providers = ["bet365", "william_hill"], weight = 0.4 }
context_intelligence = { weather = true, injuries = true, form = true, weight = 0.2 }
market_sentiment = { social_media = true, news = true, weight = 0.1 }

[workflow.steps.ai_analysis]
type = "analyze"
description = "Deep AI analysis using multiple models"

[workflow.steps.ai_analysis.models]
gemini_pro = { task = "pattern_recognition", weight = 0.4 }
ensemble_model = { task = "probability_calculation", weight = 0.3 }
neural_network = { task = "trend_analysis", weight = 0.3 }

[workflow.steps.ai_analysis.features]
team_form = { periods = [5, 10, 20], weight = 0.25 }
head_to_head = { matches = 10, weight = 0.15 }
home_advantage = { adjustment = 0.1, weight = 0.1 }
injury_impact = { severity_levels = 3, weight = 0.2 }
weather_factor = { conditions = ["rain", "wind", "temperature"], weight = 0.1 }
market_movement = { time_window = "24h", weight = 0.2 }

[workflow.steps.prediction_generation]
type = "generate"
description = "Generate predictions with confidence scoring"

[workflow.steps.prediction_generation.outputs]
primary_markets = ["1x2", "over_under_2.5"]
secondary_markets = ["btts", "handicap", "corners"]
acca_combinations = { max_legs = 12, min_confidence = 0.75 }
same_match = { max_selections = 4, diversity_requirement = true }

[workflow.steps.confidence_scoring]
type = "score"
description = "Multi-factor confidence scoring"

[workflow.steps.confidence_scoring.factors]
historical_accuracy = { weight = 0.3, lookback = 50 }
market_efficiency = { weight = 0.2, efficiency_threshold = 0.8 }
data_quality = { weight = 0.15, completeness_threshold = 0.9 }
model_agreement = { weight = 0.25, consensus_threshold = 0.7 }
risk_adjustment = { weight = 0.1, volatility_penalty = true }

[workflow.steps.risk_assessment]
type = "assess"
description = "Comprehensive risk assessment"

[workflow.steps.risk_assessment.categories]
market_risk = { volatility_calculation = true, max_volatility = 0.25 }
data_risk = { staleness_threshold = "2h", completeness_check = true }
model_risk = { confidence_drop_threshold = 0.1, uncertainty_budget = 0.05 }
operational_risk = { api_health_check = true, fallback_ready = true }

[workflow.steps.quality_control]
type = "validate"
description = "Multi-layer quality control"

[workflow.steps.quality_control.checks]
logical_consistency = { enabled = true, conflict_detection = true }
market_feasibility = { enabled = true, arbitrage_check = true }
diversification = { enabled = true, correlation_limit = 0.7 }
regulatory_compliance = { enabled = true, jurisdiction_check = true }

[workflow.steps.adaptive_learning]
type = "learn"
description = "Continuous learning and model improvement"

[workflow.steps.adaptive_learning.feedback]
prediction_outcomes = { collection = "automatic", verification = "graded" }
user_interactions = { tracking = true, sentiment_analysis = true }
market_movements = { correlation_analysis = true }
model_performance = { continuous_monitoring = true }

[workflow.steps.adaptive_learning.optimization]
hyperparameter_tuning = { frequency = "weekly", algorithm = "bayesian" }
feature_engineering = { automatic = true, importance_threshold = 0.01 }
model_retraining = { trigger = "performance_drop", threshold = 0.05 }
ensemble_weights = { dynamic_adjustment = true, rebalance_frequency = "daily" }

[workflow.steps.output_formatting]
type = "format"
description = "Format predictions for different consumption patterns"

[workflow.steps.output_formatting.formats]
api_response = { structure = "json", fields = ["prediction", "confidence", "risk"] }
web_display = { structure = "card", ui_components = ["badge", "progress", "alert"] }
mobile_app = { structure = "compact", essential_fields_only = true }
analytics_export = { structure = "csv", batch_size = 1000 }

[workflow.performance_monitoring]
type = "monitor"
description = "Real-time performance monitoring"

[workflow.performance_monitoring.metrics]
prediction_accuracy = { rolling_window = 100, alert_threshold = 0.7 }
processing_latency = { p95_threshold = "5s", alert_threshold = "10s" }
model_confidence = { drift_detection = true, alert_threshold = 0.1 }
system_health = { cpu_threshold = 0.8, memory_threshold = 0.85 }

[workflow.escalation]
type = "escalate"
description = "Intelligent escalation for critical issues"

[workflow.escalation.triggers]
accuracy_drop = { threshold = 0.15, escalation_level = "high" }
system_overload = { threshold = 0.9, escalation_level = "critical" }
data_corruption = { detection = "automatic", escalation_level = "critical" }
model_failure = { detection = "heartbeat", escalation_level = "high" }

[workflow.escalation.actions]
auto_recovery = { enabled = true, max_attempts = 3 }
human_notification = { channels = ["slack", "email", "sms"], priority = "high" }
graceful_degradation = { enabled = true, minimal_service = true }
emergency_stop = { trigger = "multiple_failures", safety_check = true }
